<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiveM Server Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
            --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
            --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
            --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
            --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
            --s1:.25rem;--s2:.5rem;--s3:.75rem;--s4:1rem;--s5:1.25rem;--s6:1.5rem;--s8:2rem;--s12:3rem;
            --r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;--r-full:9999px;
            --t:160ms cubic-bezier(.16,1,.3,1);
            --font:'Inter',system-ui,sans-serif;
        }
        [data-theme="dark"] {
            --bg:#0f0f12;--sur:#17171c;--sur2:#1e1e25;--sur3:#25252e;
            --bdr:rgba(255,255,255,.08);--div:rgba(255,255,255,.06);
            --tx:#e8e8ed;--txm:#7b7b8a;--txf:#4a4a58;
            --acc:#f5c542;--acch:#e0b43b;--accbg:rgba(245,197,66,.12);
            --grn:#2ecc71;--grnbg:rgba(46,204,113,.1);
            --red:#ef4444;--redbg:rgba(239,68,68,.1);
            --star:#f5c542;--starbg:rgba(245,197,66,.13);
            --sh1:0 1px 3px rgba(0,0,0,.35);--sh2:0 4px 16px rgba(0,0,0,.45);--sh3:0 12px 40px rgba(0,0,0,.55);
        }
        [data-theme="light"] {
            --bg:#f5f5f0;--sur:#fff;--sur2:#fafaf8;--sur3:#f0f0ec;
            --bdr:rgba(0,0,0,.09);--div:rgba(0,0,0,.06);
            --tx:#1a1a24;--txm:#6b6b7a;--txf:#b0b0bc;
            --acc:#c9930a;--acch:#a87a06;--accbg:rgba(201,147,10,.1);
            --grn:#16a34a;--grnbg:rgba(22,163,74,.1);
            --red:#dc2626;--redbg:rgba(220,38,38,.1);
            --star:#c9930a;--starbg:rgba(201,147,10,.12);
            --sh1:0 1px 3px rgba(0,0,0,.08);--sh2:0 4px 16px rgba(0,0,0,.1);--sh3:0 12px 40px rgba(0,0,0,.14);
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
        body{font-family:var(--font);font-size:var(--text-base);color:var(--tx);background:var(--bg);min-height:100dvh;padding:var(--s6) var(--s4);transition:background var(--t),color var(--t)}
        img,svg{display:block} button{cursor:pointer;font:inherit;background:none;border:none} input{font:inherit}
        @media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

        .container{max-width:940px;margin:0 auto}

        /* HEADER */
        .header{display:flex;justify-content:space-between;align-items:flex-start;gap:var(--s4);margin-bottom:var(--s6);flex-wrap:wrap}
        .h-left{display:flex;flex-direction:column;gap:var(--s1)}
        .title{display:flex;align-items:center;gap:var(--s3);font-size:var(--text-xl);font-weight:700;line-height:1.15;letter-spacing:-.02em}
        .title svg{color:var(--acc);flex-shrink:0}
        .subtitle{font-size:var(--text-sm);color:var(--txm)}
        .h-right{display:flex;align-items:center;gap:var(--s3)}
        .theme-btn{background:var(--sur2);border:1px solid var(--bdr);color:var(--txm);border-radius:var(--r-md);width:36px;height:36px;display:flex;align-items:center;justify-content:center;transition:color var(--t),background var(--t),border-color var(--t)}
        .theme-btn:hover{color:var(--acc);border-color:var(--acc)}
        .status-badge{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
        .upd-time{font-size:var(--text-xs);color:var(--txf);font-variant-numeric:tabular-nums}
        .live-badge{display:flex;align-items:center;gap:var(--s1);font-size:var(--text-xs);color:var(--grn);background:var(--grnbg);padding:2px var(--s2);border-radius:var(--r-full);font-weight:500}
        .dot{width:6px;height:6px;border-radius:50%;background:var(--grn);animation:pulse 2s ease-in-out infinite}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

        /* STATS */
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--s3);margin-bottom:var(--s5)}
        .stat{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r-lg);padding:var(--s4);box-shadow:var(--sh1);display:flex;flex-direction:column;gap:4px}
        .stat-lbl{font-size:var(--text-xs);color:var(--txm);text-transform:uppercase;letter-spacing:.06em;font-weight:500}
        .stat-val{font-size:var(--text-lg);font-weight:700;font-variant-numeric:tabular-nums;color:var(--tx);transition:color .3s}
        .stat-val.acc{color:var(--acc)} .stat-val.grn{color:var(--grn)} .stat-val.str{color:var(--star)}

        /* SERVER TABS */
        .srv-bar{display:flex;gap:var(--s2);margin-bottom:var(--s5);overflow-x:auto;padding-bottom:var(--s1);scrollbar-width:none}
        .srv-bar::-webkit-scrollbar{display:none}
        .srv-tab{display:flex;align-items:center;gap:var(--s2);background:var(--sur);border:1px solid var(--bdr);color:var(--txm);padding:var(--s2) var(--s4);border-radius:var(--r-full);font-size:var(--text-sm);font-weight:500;white-space:nowrap;transition:color var(--t),background var(--t),border-color var(--t)}
        .srv-tab:hover{color:var(--tx);border-color:var(--acc)}
        .srv-tab.active{background:var(--acc);color:#1a1a2e;border-color:var(--acc);font-weight:700}
        .tab-cnt{font-size:var(--text-xs);background:rgba(0,0,0,.15);padding:1px 6px;border-radius:var(--r-full);font-variant-numeric:tabular-nums}
        .add-btn{display:flex;align-items:center;gap:4px;border:1px dashed var(--bdr);color:var(--txf);padding:var(--s2) var(--s4);border-radius:var(--r-full);font-size:var(--text-sm);white-space:nowrap;transition:color var(--t),border-color var(--t)}
        .add-btn:hover{color:var(--grn);border-color:var(--grn)}

        /* CONTROLS */
        .controls{display:flex;gap:var(--s3);flex-wrap:wrap;margin-bottom:var(--s4);align-items:flex-end}
        .ig{display:flex;flex-direction:column;gap:4px}
        label{font-size:var(--text-xs);color:var(--txm);font-weight:500;text-transform:uppercase;letter-spacing:.05em}
        input[type=text]{background:var(--sur);border:1px solid var(--bdr);color:var(--tx);padding:var(--s2) var(--s3);border-radius:var(--r-md);outline:none;font-size:var(--text-sm);transition:border-color var(--t)}
        input[type=text]:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--accbg)}
        #ip{width:185px} #pt{width:88px}
        .sw{position:relative;flex:1;min-width:155px}
        .sw svg{position:absolute;left:var(--s3);top:50%;transform:translateY(-50%);color:var(--txf);pointer-events:none}
        #sch{width:100%;padding-left:2.2rem;background:var(--sur);border:1px solid var(--bdr);color:var(--tx);border-radius:var(--r-md);outline:none;font-size:var(--text-sm);transition:border-color var(--t)}
        #sch:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--accbg)}
        #sch::placeholder{color:var(--txf)}

        /* FILTER TABS */
        .ftabs{display:flex;gap:var(--s2);margin-bottom:var(--s3)}
        .ftab{border:1px solid var(--bdr);color:var(--txm);padding:3px var(--s3);border-radius:var(--r-full);font-size:var(--text-xs);font-weight:500;transition:color var(--t),background var(--t),border-color var(--t)}
        .ftab:hover{color:var(--tx);border-color:var(--txm)}
        .ftab.active{background:var(--starbg);color:var(--star);border-color:var(--star)}

        .btn{background:var(--acc);color:#1a1a2e;border:none;padding:var(--s2) var(--s5);border-radius:var(--r-md);font-weight:700;font-size:var(--text-sm);display:flex;align-items:center;gap:var(--s2);transition:background var(--t),transform var(--t);white-space:nowrap}
        .btn:hover{background:var(--acch)} .btn:active{transform:scale(.97)} .btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
        .btn.loading .ri{animation:spin .7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* TABLE */
        .tw{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh2);position:relative}
        .ts{overflow-x:auto}
        table{width:100%;border-collapse:collapse;min-width:590px}
        thead{position:sticky;top:0;z-index:2}
        th{background:var(--sur2);padding:var(--s3) var(--s4);text-align:left;font-size:var(--text-xs);color:var(--txm);font-weight:600;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--div);white-space:nowrap;transition:color var(--t)}
        th.s{cursor:pointer;user-select:none} th.s:hover{color:var(--tx)} th.sorted{color:var(--acc)}
        th .arr{margin-left:4px;opacity:.5} th.sorted .arr{opacity:1}
        td{padding:var(--s3) var(--s4);font-size:var(--text-sm);border-bottom:1px solid var(--div);transition:background var(--t)}
        tr:last-child td{border-bottom:none}
        tr:hover td{background:var(--sur2)}
        tr.frow td{background:rgba(245,197,66,.06)}
        tr.frow:hover td{background:rgba(245,197,66,.11)}
        tr.fsep td{border-bottom:2px solid var(--star)}
        .nc{color:var(--txf);font-variant-numeric:tabular-nums}
        .pc{display:flex;align-items:center;gap:var(--s3)}
        .av{width:32px;height:32px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:var(--text-sm);color:#fff;flex-shrink:0;text-shadow:0 1px 2px rgba(0,0,0,.3)}
        .pn{font-weight:500}
        .bot{display:inline-flex;align-items:center;gap:3px;font-size:var(--text-xs);color:var(--txf);background:var(--sur3);padding:1px var(--s2);border-radius:var(--r-full);margin-left:var(--s2);vertical-align:middle}

        /* STAR */
        .sb{padding:3px 5px;border-radius:var(--r-sm);color:var(--txf);display:flex;align-items:center;transition:color var(--t),transform var(--t)}
        .sb:hover{color:var(--star);transform:scale(1.25)}
        .sb.on{color:var(--star)}
        .sb.on svg{fill:var(--star)}
        .sb.pop{animation:spop .28s cubic-bezier(.16,1,.3,1)}
        @keyframes spop{0%{transform:scale(1)}45%{transform:scale(1.6)}100%{transform:scale(1)}}

        .dc{display:flex;align-items:center;gap:var(--s2);font-size:var(--text-xs);color:var(--txm);font-variant-numeric:tabular-nums}
        .dc svg{color:#5865F2;flex-shrink:0}
        .dc a{color:#5865F2;text-decoration:none;transition:color var(--t)}
        .dc a:hover{color:#7289da;text-decoration:underline}
        .dn{color:var(--txf)}
        .ping{font-variant-numeric:tabular-nums}
        .pg{color:var(--grn)} .pm{color:var(--acc)} .pb{color:var(--red)}

        /* LOADER */
        .loader{position:absolute;inset:0;background:rgba(15,15,18,.75);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .15s;z-index:10;border-radius:var(--r-lg)}
        .loader.on{opacity:1;pointer-events:all}
        .spin{border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;width:32px;height:32px;animation:spin .7s linear infinite}

        /* EMPTY/ERROR */
        .empty{text-align:center;padding:var(--s12) var(--s8);color:var(--txm)}
        .empty .ei{margin:0 auto var(--s4);color:var(--txf);width:40px;height:40px}
        .empty h3{color:var(--tx);margin-bottom:var(--s2);font-size:var(--text-base)}
        .empty p{font-size:var(--text-sm);max-width:40ch;margin:0 auto}
        .empty.err .ei{color:var(--red)} .empty.err h3{color:var(--red)}

        /* MODAL */
        .mo{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:var(--s4)}
        .mo.open{display:flex;animation:fi .2s ease}
        @keyframes fi{from{opacity:0}to{opacity:1}}
        .md{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r-lg);padding:var(--s6);width:100%;max-width:400px;box-shadow:var(--sh3);animation:su .2s cubic-bezier(.16,1,.3,1)}
        @keyframes su{from{transform:translateY(16px);opacity:0}to{transform:none;opacity:1}}
        .md h2{font-size:var(--text-lg);font-weight:700;margin-bottom:var(--s5)}
        .md .ig{margin-bottom:var(--s4)}
        .md .ig:last-of-type{margin-bottom:var(--s6)}
        .md input{width:100%;padding:var(--s3)}
        .ma{display:flex;justify-content:flex-end;gap:var(--s3)}
        .gbtn{border:1px solid var(--bdr);color:var(--txm);padding:var(--s2) var(--s5);border-radius:var(--r-md);font-size:var(--text-sm);font-weight:500;transition:color var(--t),border-color var(--t)}
        .gbtn:hover{color:var(--tx);border-color:var(--txm)}

        /* COUNTDOWN */
        .cbar{height:2px;background:var(--bdr);position:relative;overflow:hidden}
        .cfill{position:absolute;top:0;left:0;height:100%;background:var(--acc);transition:width 1s linear}

        /* TOAST */
        .tc{position:fixed;bottom:var(--s6);right:var(--s6);z-index:200;display:flex;flex-direction:column;gap:var(--s2);pointer-events:none}
        .toast{background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--r-md);padding:var(--s3) var(--s4);font-size:var(--text-sm);box-shadow:var(--sh2);display:flex;align-items:center;gap:var(--s2);pointer-events:auto;animation:tin .25s cubic-bezier(.16,1,.3,1);max-width:300px}
        @keyframes tin{from{transform:translateX(16px);opacity:0}to{transform:none;opacity:1}}
        .toast.ok{border-color:var(--grn)} .toast.er{border-color:var(--red)} .toast.nf{border-color:var(--acc)}

        @media(max-width:600px){
            body{padding:var(--s4) var(--s3)}
            .stats{grid-template-columns:repeat(2,1fr)}
            .controls{gap:var(--s2)}
            #ip{width:135px} #pt{width:72px}
            .header{flex-direction:column}
            .h-right{align-self:flex-start;flex-direction:row-reverse;width:100%;justify-content:space-between}
        }
        @keyframes ri{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
        tbody tr{animation:ri .18s ease both}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="h-left">
            <div class="title">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span id="htitle">Онлайн игроки</span>
            </div>
            <div class="subtitle" id="hsub">FiveM Server Monitor</div>
        </div>
        <div class="h-right">
            <button class="theme-btn" id="thbtn" aria-label="Переключить тему">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <div class="status-badge">
                <div class="upd-time" id="updtime">Ожидание...</div>
                <div class="live-badge"><div class="dot"></div><span>Авто: <span id="cdtxt">30</span>с</span></div>
            </div>
        </div>
    </div>

    <div class="stats">
        <div class="stat"><div class="stat-lbl">Онлайн</div><div class="stat-val acc" id="s-on">—</div></div>
        <div class="stat"><div class="stat-lbl">Ср. пинг</div><div class="stat-val" id="s-ping">—</div></div>
        <div class="stat"><div class="stat-lbl">Ботов</div><div class="stat-val" id="s-bot">—</div></div>
        <div class="stat"><div class="stat-lbl">Избранных</div><div class="stat-val str" id="s-fav">0</div></div>
    </div>

    <div class="srv-bar" id="srvbar"></div>

    <div class="controls">
        <div class="ig"><label for="ip">IP Адрес</label><input type="text" id="ip" value="2.59.169.66" placeholder="127.0.0.1" autocomplete="off" spellcheck="false"></div>
        <div class="ig"><label for="pt">Порт</label><input type="text" id="pt" value="27518" placeholder="30120" autocomplete="off"></div>
        <div class="ig sw">
            <label for="sch">Поиск</label>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="sch" placeholder="Имя игрока..." autocomplete="off">
        </div>
        <button class="btn" id="updbtn" onclick="doUpdate()">
            <svg class="ri" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
            Обновить
        </button>
    </div>

    <div class="ftabs">
        <button class="ftab active" id="fa" onclick="setFilter('all')">Все игроки</button>
        <button class="ftab" id="ff" onclick="setFilter('favs')">⭐ Избранные</button>
    </div>

    <div class="cbar"><div class="cfill" id="cfill"></div></div>
    <div class="tw">
        <div class="ts">
            <table aria-label="Список онлайн игроков">
                <thead><tr>
                    <th style="width:42px">#</th>
                    <th style="width:34px"></th>
                    <th class="s" data-sort="name">ИМЯ ИГРОКА <span class="arr">↕</span></th>
                    <th style="width:185px">DISCORD</th>
                    <th class="s" style="width:82px" data-sort="ping">ПИНГ <span class="arr">↕</span></th>
                </tr></thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
        <div class="loader" id="loader"><div class="spin"></div></div>
    </div>
</div>

<!-- MODAL -->
<div class="mo" id="modal" role="dialog" aria-modal="true" aria-labelledby="mtitle">
    <div class="md">
        <h2 id="mtitle">Добавить сервер</h2>
        <div class="ig"><label for="mn">Название</label><input type="text" id="mn" placeholder="Например: Main" autocomplete="off"></div>
        <div class="ig"><label for="mi">IP Адрес</label><input type="text" id="mi" placeholder="127.0.0.1" autocomplete="off"></div>
        <div class="ig"><label for="mp">Порт</label><input type="text" id="mp" placeholder="30120" autocomplete="off"></div>
        <div class="ma">
            <button class="gbtn" onclick="closeMod()">Отмена</button>
            <button class="btn" onclick="addSrv()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                Добавить
            </button>
        </div>
    </div>
</div>

<div class="tc" id="tc" aria-live="polite"></div>

<script>
// ==================== STATE ====================
var SRVS = [
    {name:'WL',   ip:'2.59.169.66',    port:'27518'},
    {name:'AD',   ip:'212.41.28.139',  port:'48489'},
    {name:'TLOU', ip:'62.122.214.166', port:'30120'}
];
var sCnts = {}, activeI = 0, players = [], sortK = null, sortA = true, fmode = 'all';
var cdTimer = null, cdVal = 30, abCtrl = null;

// ==================== FAVORITES ====================
// Safe localStorage with in-memory fallback
var FAV_KEY = 'fivem_favs';
var favSet = (function(){
    try {
        var raw = localStorage.getItem(FAV_KEY);
        return new Set(raw ? JSON.parse(raw) : []);
    } catch(e) { return new Set(); }
})();
function saveFavs() {
    try { localStorage.setItem(FAV_KEY, JSON.stringify(Array.from(favSet))); } catch(e) {}
}
function toggleFav(name) {
    if (favSet.has(name)) {
        favSet.delete(name);
    } else {
        favSet.add(name);
        toast('⭐ ' + name + ' — добавлен в избранное', 'nf');
    }
    saveFavs();
    document.getElementById('s-fav').textContent = favSet.size;
    renderTable();
}
function initFavStat() {
    document.getElementById('s-fav').textContent = favSet.size;
}

// ==================== THEME ====================
(function(){
    var btn = document.getElementById('thbtn');
    var html = document.documentElement;
    function apply(t) {
        html.setAttribute('data-theme', t);
        btn.innerHTML = t === 'dark'
            ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
            : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
    }
    apply('dark');
    btn.addEventListener('click', function() {
        apply(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
})();

// ==================== TOAST ====================
function toast(msg, type) {
    var c = document.getElementById('tc');
    var el = document.createElement('div');
    el.className = 'toast ' + (type || 'nf');
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(function() {
        el.style.transition = 'opacity .3s,transform .3s';
        el.style.opacity = '0'; el.style.transform = 'translateX(16px)';
        setTimeout(function(){ el.remove(); }, 300);
    }, 2500);
}

// ==================== COUNTDOWN ====================
function resetCD() {
    clearInterval(cdTimer);
    cdVal = 30; updateCDUI();
    cdTimer = setInterval(function() {
        cdVal--;
        updateCDUI();
        if (cdVal <= 0) { doUpdate(); cdVal = 30; }
    }, 1000);
}
function updateCDUI() {
    var f = document.getElementById('cfill'), t = document.getElementById('cdtxt');
    if (f) f.style.width = ((30 - cdVal) / 30 * 100) + '%';
    if (t) t.textContent = cdVal;
}

// ==================== SERVER TABS ====================
function renderSrvs() {
    var c = document.getElementById('srvbar'); c.innerHTML = '';
    SRVS.forEach(function(s, i) {
        var b = document.createElement('button');
        b.className = 'srv-tab' + (i === activeI ? ' active' : '');
        var cnt = sCnts[i] !== undefined ? '<span class="tab-cnt">' + sCnts[i] + '</span>' : '';
        b.innerHTML = s.name + cnt;
        b.title = s.ip + ':' + s.port;
        b.onclick = function(){ selSrv(i); };
        c.appendChild(b);
    });
    var a = document.createElement('button');
    a.className = 'add-btn';
    a.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/><path d="M12 5v14"/></svg> Добавить';
    a.onclick = openMod;
    c.appendChild(a);
}
function selSrv(i) {
    if (i === activeI) return;
    activeI = i;
    document.getElementById('ip').value = SRVS[i].ip;
    document.getElementById('pt').value = SRVS[i].port;
    document.getElementById('sch').value = '';
    renderSrvs(); doUpdate();
}

// ==================== MODAL ====================
function openMod() { document.getElementById('modal').classList.add('open'); document.getElementById('mn').focus(); }
function closeMod() {
    document.getElementById('modal').classList.remove('open');
    ['mn','mi','mp'].forEach(function(id){ document.getElementById(id).value=''; });
}
function addSrv() {
    var n=document.getElementById('mn').value.trim(), ip=document.getElementById('mi').value.trim(), p=document.getElementById('mp').value.trim();
    if (!n||!ip||!p) { toast('Заполните все поля','er'); return; }
    SRVS.push({name:n,ip:ip,port:p}); closeMod(); selSrv(SRVS.length-1);
    toast('Сервер "'+n+'" добавлен','ok');
}
document.getElementById('modal').addEventListener('click', function(e){ if(e.target===this) closeMod(); });
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeMod(); });

// ==================== SORT ====================
document.querySelectorAll('th.s[data-sort]').forEach(function(th) {
    th.addEventListener('click', function() {
        var k = th.dataset.sort;
        if (sortK === k) sortA = !sortA; else { sortK = k; sortA = true; }
        document.querySelectorAll('th.s[data-sort]').forEach(function(h) {
            h.classList.toggle('sorted', h.dataset.sort === k);
            var a = h.querySelector('.arr');
            if (a) a.textContent = h.dataset.sort === k ? (sortA ? '↑' : '↓') : '↕';
        });
        renderTable();
    });
});
document.getElementById('sch').addEventListener('input', renderTable);
function setFilter(m) {
    fmode = m;
    document.getElementById('fa').classList.toggle('active', m==='all');
    document.getElementById('ff').classList.toggle('active', m==='favs');
    renderTable();
}

// ==================== PING CLASS ====================
function pc(p) {
    var v = parseInt(p); if (isNaN(v)||v<=0) return '';
    return v<80?'pg':v<150?'pm':'pb';
}

// ==================== RENDER TABLE ====================
var DSVG = '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" style="color:#5865F2;flex-shrink:0"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.044.028.054a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>';
var SOFF = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
var SON  = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
var AVC  = ["#3b82f6","#10b981","#8b5cf6","#ef4444","#f59e0b","#06b6d4","#ec4899","#84cc16","#f97316","#6366f1"];

function renderTable() {
    var tbody = document.getElementById('tbody');
    var q = document.getElementById('sch').value.trim().toLowerCase();

    var favs = [], others = [];
    players.forEach(function(p) {
        (favSet.has(p.name) ? favs : others).push(p);
    });

    var list;
    if (fmode === 'favs') { list = favs; }
    else { list = favs.concat(others); }
    if (q) { list = list.filter(function(p){ return (p.name||'').toLowerCase().indexOf(q) !== -1; }); }

    var sf = function(a, b) {
        if (sortK === 'name') { var c=(a.name||'').localeCompare(b.name||'','ru'); return sortA?c:-c; }
        if (sortK === 'ping') { var pa=parseInt(a.ping)||9999, pb=parseInt(b.ping)||9999; return sortA?pa-pb:pb-pa; }
        return 0;
    };
    if (fmode === 'all' && sortK) {
        var fq=list.filter(function(p){return favSet.has(p.name);}).sort(sf);
        var oq=list.filter(function(p){return !favSet.has(p.name);}).sort(sf);
        list = fq.concat(oq);
    } else if (sortK) { list = list.slice().sort(sf); }

    tbody.innerHTML = '';

    if (!list.length) {
        var msg = fmode==='favs'
            ? {t:'Нет избранных',s:'Нажмите ⭐ рядом с именем игрока чтобы добавить его сюда.'}
            : {t:'Ничего не найдено',s:'По запросу «'+q+'» игроков не найдено.'};
        tbody.innerHTML = '<tr><td colspan="5"><div class="empty"><div class="ei"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div><h3>'+msg.t+'</h3><p>'+msg.s+'</p></div></td></tr>';
        return;
    }

    var lastFav = false;
    var frag = document.createDocumentFragment();
    list.forEach(function(p, vi) {
        var name = p.name || 'Неизвестно';
        var ping = p.ping !== undefined ? p.ping : '-';
        var id   = p.id !== undefined ? p.id : vi;
        var isFav = favSet.has(name);
        var color = AVC[id % AVC.length];
        var letter = name.charAt(0).toUpperCase();

        var discordId = null, hasReal = false;
        if (p.identifiers) {
            p.identifiers.forEach(function(iden) {
                if (iden.indexOf('discord:') === 0) discordId = iden.slice(8);
                if (/^(steam:|license:|discord:|xbl:)/.test(iden)) hasReal = true;
            });
        }
        var isBot = (ping === 0 || ping === '0') && !hasReal;
        var isSep = fmode==='all' && !q && lastFav && !isFav && favs.length > 0;

        var dhtml = discordId
            ? DSVG+'<a href="https://discord.com/users/'+discordId+'" target="_blank" rel="noopener noreferrer">'+discordId+'</a>'
            : '<span class="dn">—</span>';
        var botbadge = isBot ? '<span class="bot">Бот</span>' : '';
        var pinghtml = isBot ? '<span style="color:var(--txf)">—</span>'
            : '<span class="ping '+pc(ping)+'">'+(ping!=='-'?ping+'ms':'—')+'</span>';

        var starLabel = isFav ? 'Убрать из избранного' : 'Добавить в избранное';
        var tr = document.createElement('tr');
        if (isFav) tr.classList.add('frow');
        if (isSep) tr.classList.add('fsep');
        if (isBot) tr.style.opacity = '.48';
        tr.style.animationDelay = (vi * 16) + 'ms';
        tr.innerHTML =
            '<td class="nc">'+(vi+1)+'</td>'+
            '<td style="padding-right:0;padding-left:var(--s3)">'+
              '<button class="sb'+(isFav?' on':'')+'" data-name="'+encodeURIComponent(name)+'" aria-label="'+starLabel+'" title="'+starLabel+'">'+
                (isFav ? SON : SOFF)+
              '</button>'+
            '</td>'+
            '<td><div class="pc">'+
              '<div class="av" style="background:'+color+'">'+letter+'</div>'+
              '<span class="pn">'+name+botbadge+'</span>'+
            '</div></td>'+
            '<td><div class="dc">'+dhtml+'</div></td>'+
            '<td>'+pinghtml+'</td>';
        frag.appendChild(tr);
        lastFav = isFav;
    });
    tbody.appendChild(frag);
}

// Event delegation for star buttons — avoids re-binding on every render
document.getElementById('tbody').addEventListener('click', function(e) {
    var btn = e.target.closest('.sb');
    if (!btn) return;
    var name = decodeURIComponent(btn.dataset.name);
    btn.classList.add('pop');
    btn.addEventListener('animationend', function(){ btn.classList.remove('pop'); }, {once:true});
    toggleFav(name);
});

// ==================== FAST PARALLEL FETCH ====================
function fetchFast(ip, port) {
    var url = 'http://' + ip + ':' + port + '/players.json';
    var proxies = [
        'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
        'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url),
        'https://thingproxy.freeboard.io/fetch/' + url
    ];

    if (abCtrl) { try { abCtrl.abort(); } catch(e){} }
    abCtrl = new AbortController();
    var sig = abCtrl.signal;

    return new Promise(function(resolve) {
        var done = false, errs = 0, total = proxies.length;

        proxies.forEach(function(proxy) {
            var timer = setTimeout(function(){ /* handled by errs++ below */ }, 4000);
            fetch(proxy, {signal: sig})
                .then(function(r) {
                    clearTimeout(timer);
                    if (!r.ok) throw new Error('bad status ' + r.status);
                    return r.json();
                })
                .then(function(data) {
                    clearTimeout(timer);
                    if (!done && Array.isArray(data)) {
                        done = true;
                        resolve(data);
                    } else if (!Array.isArray(data)) {
                        throw new Error('not array');
                    }
                })
                .catch(function() {
                    clearTimeout(timer);
                    errs++;
                    if (errs === total && !done) resolve(null);
                });
        });

        // Hard timeout fallback
        setTimeout(function() {
            if (!done) { done = true; resolve(null); }
        }, 5000);
    });
}

// ==================== MAIN UPDATE ====================
function doUpdate() {
    var ip = document.getElementById('ip').value.trim();
    var port = document.getElementById('pt').value.trim();
    if (!ip || !port) { toast('Введите IP и порт','er'); return; }

    var btn = document.getElementById('updbtn');
    var ldr = document.getElementById('loader');
    btn.disabled = true; btn.classList.add('loading');
    ldr.classList.add('on');
    resetCD();

    fetchFast(ip, port).then(function(data) {
        ldr.classList.remove('on');
        btn.disabled = false; btn.classList.remove('loading');

        var htitle = document.getElementById('htitle');
        var hsub   = document.getElementById('hsub');
        var tbody  = document.getElementById('tbody');

        if (!data) {
            htitle.textContent = 'Онлайн игроки'; hsub.textContent = 'FiveM Server Monitor';
            tbody.innerHTML = '<tr><td colspan="5"><div class="empty err"><div class="ei"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg></div><h3>Нет соединения</h3><p>Проверьте IP и порт, или сервер временно недоступен.</p></div></td></tr>';
            updStats([], 0); toast('Не удалось получить данные','er'); return;
        }

        players = data;
        var srv = SRVS[activeI];
        var match = srv && srv.ip===ip && srv.port===port;
        var sName = match ? srv.name : ip+':'+port;

        var hum = players.filter(function(p) {
            var hr = p.identifiers && p.identifiers.some(function(id){ return /^(steam:|license:|discord:|xbl:)/.test(id); });
            return !((p.ping===0||p.ping==='0') && !hr);
        }).length;

        if (match) sCnts[activeI] = hum;
        renderSrvs();

        htitle.textContent = players.length > 0 ? 'Онлайн: '+players.length : 'Онлайн игроки';
        hsub.textContent   = sName + (players.length > 0 ? ' · FiveM' : ' · Нет игроков');

        updStats(players, hum);
        renderTable();
        document.getElementById('updtime').textContent = 'Обновлено: ' + new Date().toLocaleTimeString('ru-RU');
    });
}

function updStats(pl, hum) {
    var on = document.getElementById('s-on'), pg = document.getElementById('s-ping'), bt = document.getElementById('s-bot');
    if (!pl.length) { on.textContent='0'; pg.textContent='—'; bt.textContent='0'; return; }
    var bots = pl.length - hum;
    var pings = pl.filter(function(p){ return p.ping>0&&!isNaN(p.ping); }).map(function(p){ return parseInt(p.ping); });
    var avg = pings.length ? Math.round(pings.reduce(function(a,b){return a+b;},0)/pings.length) : null;
    on.textContent = pl.length; bt.textContent = bots;
    pg.textContent = avg!==null ? avg+'ms' : '—';
    pg.className = 'stat-val';
    if (avg!==null) { pg.classList.add(avg<80?'grn':avg<150?'acc':''); if(avg>=150) pg.style.color='var(--red)'; }
}

// ==================== INIT ====================
document.getElementById('ip').value   = SRVS[activeI].ip;
document.getElementById('pt').value   = SRVS[activeI].port;
initFavStat();
renderSrvs();
doUpdate();
</script>
