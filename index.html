<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiveM Server Monitor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #1a1a2e; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .title { font-size: 24px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .title-icon { color: #f5c542; font-size: 28px; }
        .status-info { text-align: right; }
        .update-time { color: #5c5c6d; font-size: 14px; }
        .auto-update { color: #2ecc71; font-size: 12px; }

        /* Стили для плашки с серверами */
        .server-selector { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; flex-wrap: wrap; }
        .server-tab { background: #141426; border: 1px solid #5c5c6d; color: #fff; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 14px; transition: 0.2s; white-space: nowrap; outline: none; }
        .server-tab:hover { border-color: #f5c542; }
        .server-tab.active { background: #f5c542; color: #1a1a2e; border-color: #f5c542; font-weight: bold; }
        .add-server-btn { background: transparent; border: 1px dashed #5c5c6d; color: #5c5c6d; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 14px; transition: 0.2s; display: flex; align-items: center; gap: 5px; outline: none; }
        .add-server-btn:hover { border-color: #2ecc71; color: #2ecc71; }

        .controls { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { color: #5c5c6d; font-size: 13px; }
        input { background: transparent; border: 1px solid #5c5c6d; color: #fff; padding: 10px; border-radius: 5px; outline: none; font-size: 15px; }
        input:focus { border-color: #f5c542; }
        .btn { background: #f5c542; color: #1a1a2e; border: none; padding: 12px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 15px; transition: 0.2s; }
        .btn:hover { background: #e0b43b; }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }

        .table-container { background: #141426; border-radius: 8px; overflow-x: auto; position: relative; min-height: 200px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #2c2c3e; }
        th { color: #5c5c6d; font-size: 13px; font-weight: normal; }
        td { font-size: 15px; }
        
        .player-name-cell { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; color: #fff; }
        
        .loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 26, 46, 0.7); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; border-radius: 8px; z-index: 10; }
        .loader.active { opacity: 1; pointer-events: all; }
        .spinner { border: 4px solid #5c5c6d; border-top: 4px solid #f5c542; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-msg { color: #ef4444; text-align: center; padding: 30px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="title">
            <span class="title-icon">👥</span>
            <span id="header-title">Онлайн игроки</span>
        </div>
        <div class="status-info">
            <div class="update-time" id="update-time">Ожидание данных...</div>
            <div class="auto-update">Автообновление: 30 сек</div>
        </div>
    </div>

    <div class="server-selector" id="server-selector">
        </div>

    <div class="controls">
        <div class="input-group">
            <label>IP Адрес</label>
            <input type="text" id="ip-input" value="2.59.169.66" style="width: 200px;">
        </div>
        <div class="input-group">
            <label>Порт</label>
            <input type="text" id="port-input" value="27518" style="width: 100px;">
        </div>
        <button class="btn" id="update-btn" onclick="triggerUpdate()">
            <span>🔄</span> Обновить
        </button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">#</th>
                    <th>ИМЯ ИГРОКА</th>
                    <th style="width: 200px;">DISCORD</th>
                    <th style="width: 80px;">ПИНГ</th>
                </tr>
            </thead>
            <tbody id="table-body">
            </tbody>
        </table>
        <div class="loader" id="loader">
            <div class="spinner"></div>
        </div>
    </div>
</div>

<script>
    // Массив серверов по умолчанию
    let servers = [
        { name: 'WL', ip: '2.59.169.66', port: '27518' },
        { name: 'AD', ip: '212.41.28.139', port: '48489' },
        { name: 'TLOU', ip: '62.122.214.166', port: '30120' }
    ];
    let activeServerIndex = 0;

    // Отрисовка плашки серверов
    function renderServers() {
        const container = document.getElementById('server-selector');
        container.innerHTML = '';
        
        servers.forEach((srv, index) => {
            const btn = document.createElement('button');
            btn.className = `server-tab ${index === activeServerIndex ? 'active' : ''}`;
            btn.innerText = srv.name;
            btn.onclick = () => selectServer(index);
            container.appendChild(btn);
        });

        const addBtn = document.createElement('button');
        addBtn.className = 'add-server-btn';
        addBtn.innerHTML = '<span>+</span> Добавить';
        addBtn.onclick = addNewServer;
        container.appendChild(addBtn);
    }

    // Выбор сервера из плашки
    function selectServer(index) {
        if (index === activeServerIndex) return; 
        activeServerIndex = index;
        const srv = servers[index];
        
        // Обновляем инпуты
        document.getElementById('ip-input').value = srv.ip;
        document.getElementById('port-input').value = srv.port;
        
        // Перерисовываем UI и запускаем обновление
        renderServers();
        triggerUpdate();
    }

    // Добавление нового сервера
    function addNewServer() {
        const name = prompt("Введите название сервера (например, Main):");
        if (!name) return;
        const ip = prompt("Введите IP адрес (например, 127.0.0.1):");
        if (!ip) return;
        const port = prompt("Введите порт (например, 30120):");
        if (!port) return;

        servers.push({ name, ip, port });
        selectServer(servers.length - 1);
    }

    const avatarColors = ["#3498db", "#1abc9c", "#9b59b6", "#e74c3c", "#2ecc71", "#f39c12", "#34495e", "#e67e22", "#d35400", "#c0392b"];

    function getAvatarColor(id) {
        return avatarColors[id % avatarColors.length];
    }

    // Функция fetch с таймаутом
    async function fetchWithTimeout(resource, options = {}) {
        const { timeout = 5000 } = options; 
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        const response = await fetch(resource, {
            ...options,
            signal: controller.signal
        });
        clearTimeout(id);
        return response;
    }

    async function triggerUpdate() {
        const ip = document.getElementById('ip-input').value.trim();
        const port = document.getElementById('port-input').value.trim();
        const btn = document.getElementById('update-btn');
        const loader = document.getElementById('loader');
        const tableBody = document.getElementById('table-body');
        const updateTime = document.getElementById('update-time');
        const headerTitle = document.getElementById('header-title');

        btn.disabled = true;
        loader.classList.add('active');

        const targetUrl = `http://${ip}:${port}/players.json`;
        
        // Массив прокси для обхода CORS
        const proxies = [
            `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`,
            `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`,
            `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`
        ];

        let data = null;
        let success = false;

        // Перебираем прокси, пока не получим ответ
        for (let proxyUrl of proxies) {
            try {
                const response = await fetchWithTimeout(proxyUrl, { timeout: 5000 });
                if (response.ok) {
                    data = await response.json();
                    success = true;
                    break; 
                }
            } catch (error) {
                console.warn(`Прокси ${proxyUrl} не ответил, пробуем другой...`);
            }
        }

        try {
            if (!success) {
                throw new Error('Все прокси недоступны или сервер выключен');
            }
            
            tableBody.innerHTML = ''; 

            if (data && data.length > 0) {
                // Отображаем название активного сервера, если инпуты совпадают с ним
                const activeSrvName = servers[activeServerIndex].ip === ip && servers[activeServerIndex].port === port 
                    ? servers[activeServerIndex].name 
                    : "";
                const titlePrefix = activeSrvName ? `[${activeSrvName}] ` : "";
                
                headerTitle.innerText = `${titlePrefix}Онлайн: ${data.length}`;
                
                data.forEach((player, index) => {
                    const name = player.name || "Неизвестно";
                    const ping = player.ping !== undefined ? player.ping : "-";
                    const id = player.id || index;
                    const firstLetter = name.charAt(0).toUpperCase();
                    const color = getAvatarColor(id);

                    let discordId = "-";
                    let hasRealIdentifiers = false;

                    if (player.identifiers && player.identifiers.length > 0) {
                        for (let iden of player.identifiers) {
                            if (iden.startsWith("discord:")) {
                                discordId = iden.replace("discord:", "");
                            }
                            // Проверка на реальные идентификаторы для исключения ботов
                            if (iden.startsWith("steam:") || iden.startsWith("license:") || iden.startsWith("discord:") || iden.startsWith("xbl:")) {
                                hasRealIdentifiers = true;
                            }
                        }
                    }

                    // Определение бота: пинг 0 и нет реальных ID
                    const isLikelyBot = (ping === 0 || ping === "0") && !hasRealIdentifiers;
                    
                    const botBadge = isLikelyBot ? `<span title="Скорее всего это бот" style="cursor: help; margin-left: 5px;">🤖</span>` : '';
                    const pingDisplay = isLikelyBot ? `<span style="color: #5c5c6d;">Бот</span>` : ping;

                    const tr = document.createElement('tr');
                    // Если это бот, делаем строку слегка прозрачной
                    if (isLikelyBot) {
                        tr.style.opacity = "0.7";
                    }

                    tr.innerHTML = `
                        <td style="color: #5c5c6d;">${index + 1}</td>
                        <td>
                            <div class="player-name-cell">
                                <div class="avatar" style="background-color: ${color};">${firstLetter}</div>
                                <span>${name} ${botBadge}</span>
                            </div>
                        </td>
                        <td>${discordId}</td>
                        <td>${pingDisplay}</td>
                    `;
                    tableBody.appendChild(tr);
                });
            } else {
                headerTitle.innerText = `Онлайн игроки`;
                tableBody.innerHTML = `<tr><td colspan="4" class="error-msg">На сервере сейчас нет игроков.</td></tr>`;
            }

            const now = new Date();
            updateTime.innerText = `Обновлено: ${now.toLocaleTimeString('ru-RU')}`;

        } catch (error) {
            console.error("Итоговая ошибка:", error);
            headerTitle.innerText = `Онлайн игроки`;
            tableBody.innerHTML = `<tr><td colspan="4" class="error-msg">⚠️ Не удалось получить данные. Убедитесь, что IP и порт верны, а сервер запущен.</td></tr>`;
        }

        loader.classList.remove('active');
        btn.disabled = false;
    }

    // Инициализация при первом запуске
    document.getElementById('ip-input').value = servers[activeServerIndex].ip;
    document.getElementById('port-input').value = servers[activeServerIndex].port;
    renderServers();
    triggerUpdate();

    // Автообновление каждые 30 секунд
    setInterval(triggerUpdate, 30000);
</script>

</body>
</html>
